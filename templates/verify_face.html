<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face Verification | FairEx</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════
       GLOBAL & BASE CSS
       ═══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root, [data-theme="dark"] {
      --bg: #07101f; --bg2: #0d1b3e;
      --card: rgba(255,255,255,.05); --card2: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.09);
      --blue: #2d5be3; --blue2: #1e4acb;
      --text: #dde4f0; --muted: #7a8fad; --white: #fff;
    }
    [data-theme="light"] {
      --bg: #f0f4ff; --bg2: #e4ecff;
      --card: rgba(255,255,255,.85); --card2: rgba(255,255,255,.95);
      --border: rgba(45,91,227,.15);
      --blue: #2d5be3; --blue2: #1e4acb;
      --text: #1a2540; --muted: #5a6a8a; --white: #fff;
    }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes drift { 0% { transform: translateY(110vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: .5; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }

    /* NAV BAR */
    #nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 28px;
      background: rgba(5,10,22,.82); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .lgo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .lgo-nm { font-size: 16px; font-weight: 700; color: var(--white); line-height: 1.1; display: block; }
    .lgo-sub { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; display: block; }
    .gc-logo img, .lgo img { filter: brightness(0) invert(1); }
    [data-theme="light"] .gc-logo img, [data-theme="light"] .lgo img { filter: none; }

    .na { display: flex; align-items: center; gap: 10px; }
    #themeToggle {
      display: flex; align-items: center; gap: 6px; padding: 7px 13px; border-radius: 8px;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      color: var(--muted); font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .2s;
    }
    #themeToggle:hover { background: rgba(255,255,255,.1); color: var(--white); }

    /* PAGE STRUCTURE */
    .auth-wrap {
      min-height: 100vh; padding-top: 64px; position: relative;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .auth-bg { position: absolute; inset: 0; background-image: url('https://images.unsplash.com/photo-1606326608606-aa0b62935f2b?w=1400&q=80'); background-size: cover; background-position: center; }
    .auth-ov { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(5,10,22,.94), rgba(8,16,40,.88) 55%, rgba(4,8,18,.96)); }
    .ptcls { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
    .pt { position: absolute; border-radius: 50%; background: rgba(45,91,227,.3); animation: drift linear infinite; }

    /* CARD UI */
    .auth-box { position: relative; z-index: 3; width: 100%; max-width: 480px; padding: 22px; }
    .gc {
      background: rgba(6,13,32,.85); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,.1); border-radius: 18px; padding: 38px 40px;
      animation: slideUp .5s ease;
    }
    .gc-logo { display: flex; justify-content: center; margin-bottom: 18px; }
    .gc-logo img { height: 50px; width: auto; object-fit: contain; }
    .gc-title { font-size: 22px; font-weight: 700; color: var(--white); text-align: center; margin-bottom: 5px; }
    .gc-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 25px; line-height: 1.5; }

    /* CAMERA FEED */
    .cam-feed {
      position: relative;
      width: 100%;
      height: 260px;
      background: #000;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.15);
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Mirror effect */
    }

    /* Scanning Brackets */
    .corner { position: absolute; width: 20px; height: 20px; border: 3px solid rgba(45,91,227,0.8); z-index: 2; border-radius: 4px; transition: all 0.3s ease; }
    .c-tl { top: 15px; left: 15px; border-right: none; border-bottom: none; }
    .c-tr { top: 15px; right: 15px; border-left: none; border-bottom: none; }
    .c-bl { bottom: 15px; left: 15px; border-right: none; border-top: none; }
    .c-br { bottom: 15px; right: 15px; border-left: none; border-top: none; }

    .cam-feed.scanning .corner { border-color: #27ae60; width: 25px; height: 25px; }
    .cam-feed.error .corner { border-color: #e74c3c; }

    /* BUTTON */
    .fb-nx {
      width: 100%; padding: 14px; background: var(--blue); border: none; color: white;
      border-radius: 10px; cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 600;
      transition: background .2s, transform .1s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .fb-nx:hover { background: var(--blue2); }
    .fb-nx:active { transform: scale(.98); }
    .fb-nx:disabled { opacity: 0.6; cursor: not-allowed; }

    /* STATUS TEXT */
    .status-msg {
      margin-top: 15px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      height: 20px;
      transition: color 0.3s;
    }
    .text-muted { color: var(--muted); }
    .text-success { color: #5dde8a; }
    .text-error { color: #ff7675; }

    /* LIGHT THEME */
    [data-theme="light"] { --card: rgba(45,91,227,.06); --border: rgba(45,91,227,.2); --text: #1a2340; --muted: #6b7a9e; --white: #1a2340; }
    [data-theme="light"] body { background: #eef1f9; }
    [data-theme="light"] #nav { background: rgba(255,255,255,.9); border-bottom-color: rgba(45,91,227,.12); }
    [data-theme="light"] #themeToggle { background: rgba(45,91,227,.06); border-color: rgba(45,91,227,.15); color: var(--muted); }
    [data-theme="light"] .gc { background: rgba(255,255,255,.92); border-color: rgba(45,91,227,.15); box-shadow: 0 8px 40px rgba(45,91,227,.12); }
    [data-theme="light"] .cam-feed { border-color: rgba(45,91,227,.3); box-shadow: 0 10px 30px rgba(45,91,227,.15); }
  </style>
</head>
<body>

<nav id="nav">
  <a class="lgo" href="{{ url_for('index') }}">
    <img src="{{ url_for('static', filename='assets/logo.png') }}" height="36" alt="FairEx" onerror="this.style.display='none'">
    <div><span class="lgo-nm">FairEx</span><span class="lgo-sub">Education</span></div>
  </a>
  <div class="na">
    <button id="themeToggle" onclick="toggleTheme()">
      <span id="themeIcon">☀️</span><span id="themeLabel">Light</span>
    </button>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-bg"></div>
  <div class="auth-ov"></div>
  <div class="ptcls" id="ptcls"></div>

  <div class="auth-box">
    <div class="gc">

      <div class="gc-logo">
        <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="FairEx" onerror="this.style.display='none'">
      </div>

      <div class="gc-title">Face Verification</div>
      <div class="gc-sub">Please center your face in the camera frame to verify your identity before starting the exam.</div>

      <div class="cam-feed" id="cam-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="corner c-tl"></div>
        <div class="corner c-tr"></div>
        <div class="corner c-bl"></div>
        <div class="corner c-br"></div>
      </div>

      <button id="capture-btn" class="fb-nx">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Capture & Verify
      </button>

      <div id="status" class="status-msg text-muted">Waiting for camera...</div>

    </div>
  </div>
</div>

<script>
  // --- UI Theme & Particles Logic ---
  function toggleTheme() {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
    document.getElementById('themeIcon').textContent  = isLight ? '☀️' : '🌙';
    document.getElementById('themeLabel').textContent = isLight ? 'Light' : 'Dark';
  }

  (function() {
    const wrap = document.getElementById('ptcls');
    for (let i = 0; i < 15; i++) {
      const p = document.createElement('div');
      p.className = 'pt';
      const size = Math.random() * 6 + 3;
      p.style.cssText = `width:${size}px; height:${size}px; left:${Math.random() * 100}%; animation-duration:${Math.random() * 14 + 8}s; animation-delay:-${Math.random() * 10}s; opacity:${Math.random() * .4 + .1}`;
      wrap.appendChild(p);
    }
  })();

  // --- Verification Backend Logic ---
  const video = document.getElementById('video');
  const captureBtn = document.getElementById('capture-btn');
  const statusText = document.getElementById('status');
  const camContainer = document.getElementById('cam-container');

  // Initialize Webcam
  navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
          video.srcObject = stream;
          statusText.textContent = "Ready to verify.";
          statusText.className = "status-msg text-muted";
      })
      .catch(err => {
          statusText.textContent = "Camera access denied.";
          statusText.className = "status-msg text-error";
          camContainer.classList.add("error");
          captureBtn.disabled = true;
      });

  // Capture & Verify
  captureBtn.addEventListener('click', () => {
      // UI Loading State
      statusText.textContent = "Processing face data...";
      statusText.className = "status-msg text-muted";
      captureBtn.disabled = true;
      captureBtn.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite;">
          <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
        </svg> Verifying...`;

      // Capture frame to canvas
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      // Mirror context back since CSS mirrored the video element
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const dataURL = canvas.toDataURL('image/jpeg');

      // Send to backend
      fetch("/verify_face", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({ exam_image: dataURL })
      })
      .then(res => res.json())
      .then(data => {
          if (data.status === "success") {
              // Success UI State
              statusText.textContent = "Identity verified! Redirecting...";
              statusText.className = "status-msg text-success";
              camContainer.classList.remove("error");
              camContainer.classList.add("scanning");
              captureBtn.innerHTML = `✓ Verified`;

              // Redirect to exam
              setTimeout(() => { window.location.href = "/exam3"; }, 1500);
          } else {
              // Error UI State
              statusText.textContent = "Verification failed. Please try again.";
              statusText.className = "status-msg text-error";
              camContainer.classList.add("error");
              resetButton();
          }
      })
      .catch(err => {
          console.error("Error:", err);
          statusText.textContent = "Server error. Please try again.";
          statusText.className = "status-msg text-error";
          camContainer.classList.add("error");
          resetButton();
      });
  });

  function resetButton() {
      captureBtn.disabled = false;
      captureBtn.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg> Capture & Verify`;
  }
</script>

<style>
  @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</body>
</html>
